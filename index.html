<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="">Enter First no.:</label>
    <input type="text" placeholder="First No." id="val1"><br><br>
    <label for="">Enter Second no.: </label>
    <input type="text" placeholder="Second no." id="val2"><br><br>
    <button onclick="Addnum()">Click to Add</button>
    <p id="result"></p>
    <script>
       function Addnum(){
         const x = Number(document.getElementById("val1").value);
        const y=Number(document.getElementById("val2").value);
        let Add=x+y;
        document.getElementById("result").innerHTML="Addition is: "+Add;
       }
    </script>
</body>
</html>
